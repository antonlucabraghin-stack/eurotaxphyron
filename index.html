<!DOCTYPE html>

<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Phyron Dashboard</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  background: #f6f7f5;
  margin: 0;
  padding: 20px;
  color: #111;
}

h1 {
  font-size: 22px;
  margin-bottom: 20px;
}

.grid {
  display: grid;
  gap: 16px;
}

.metrics {
  grid-template-columns: repeat(4, 1fr);
}

.card {
  background: white;
  border: 1px solid #e4e4e2;
  border-radius: 12px;
  padding: 16px;
}

.metric-title {
  font-size: 12px;
  color: #777;
}

.metric-value {
  font-size: 24px;
  font-weight: 600;
  margin-top: 6px;
}

.row {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 16px;
  margin-top: 16px;
}

canvas {
  width: 100% !important;
  height: 200px !important;
}

table {
  width: 100%;
  border-collapse: collapse;
  font-size: 13px;
}

td, th {
  padding: 6px;
  border-bottom: 1px solid #eee;
}

.amount {
  text-align: right;
}

@media (max-width: 800px) {
  .metrics {
    grid-template-columns: repeat(2, 1fr);
  }

  .row {
    grid-template-columns: 1fr;
  }
}
</style>

</head>

<body>

<h1>Phyron Dashboard</h1>

<div class="grid metrics">
  <div class="card">
    <div class="metric-title">MRR Attuale</div>
    <div class="metric-value">€2,202</div>
  </div>

  <div class="card">
    <div class="metric-title">ARR</div>
    <div class="metric-value">€26,424</div>
  </div>

  <div class="card">
    <div class="metric-title">Forecast 2026</div>
    <div class="metric-value">€5k–8k</div>
  </div>

  <div class="card">
    <div class="metric-title">Proiezione 2027</div>
    <div class="metric-value">€60k–96k</div>
  </div>
</div>

<div class="row">

  <div class="card">
    <h3>Pagamenti</h3>
    <canvas id="paymentsChart"></canvas>
  </div>

  <div class="card">
    <h3>MRR Clienti</h3>
    <canvas id="mrrChart"></canvas>
  </div>

</div>

<div class="row">

  <div class="card">
    <h3>Pagamenti Pending</h3>

```
<table>
  <tr><th>Cliente</th><th class="amount">€</th></tr>
  <tr><td>Dealer A</td><td class="amount">2500</td></tr>
  <tr><td>Dealer B</td><td class="amount">1800</td></tr>
  <tr><td>Dealer C</td><td class="amount">2364</td></tr>
</table>
```

  </div>

  <div class="card">
    <h3>Funnel</h3>
    <canvas id="funnelChart"></canvas>
  </div>

</div>

<script>

// Payments chart
new Chart(document.getElementById('paymentsChart'), {
  type: 'bar',
  data: {
    labels: ['Q2 2025', 'Q3 2025', 'Q4 2025', 'Q1 2026'],
    datasets: [{
      label: '€',
      data: [2184, 983, 4340, 3438]
    }]
  }
});

// MRR chart
new Chart(document.getElementById('mrrChart'), {
  type: 'bar',
  data: {
    labels: ['Cliente A', 'Cliente B', 'Cliente C', 'Cliente D'],
    datasets: [{
      label: 'MRR',
      data: [1200, 900, 1500, 800]
    }]
  }
});

// Funnel chart
new Chart(document.getElementById('funnelChart'), {
  type: 'bar',
  data: {
    labels: ['Contatti', 'App', 'Proposals', 'Clienti'],
    datasets: [{
      data: [110, 72, 47, 18]
    }]
  }
});

</script>

</body>
</html>
